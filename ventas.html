<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZG Ventas</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --verde: #2d6a4f; --verde-claro: #52b788; --verde-suave: #d8f3dc;
      --blanco: #ffffff; --gris: #f4f4f0; --texto: #1b1b1b; --sombra: rgba(45,106,79,0.15);
      --rojo: #e63946; --amarillo: #f4a261;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: var(--gris); color: var(--texto); }

    header { background: var(--verde); color: white; padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px var(--sombra); }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .back-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 0.35rem 1rem; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; text-decoration: none; }
    .back-btn:hover { background: rgba(255,255,255,0.25); }

    .layout { display: grid; grid-template-columns: 1fr 380px; gap: 1.2rem; padding: 1.2rem; max-width: 1200px; margin: 0 auto; }

    /* PANEL IZQUIERDO */
    .panel-izq { display: flex; flex-direction: column; gap: 1rem; }

    .card { background: white; border-radius: 16px; padding: 1.2rem; box-shadow: 0 2px 12px var(--sombra); }
    .card-titulo { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--verde); margin-bottom: 0.8rem; font-weight: 700; }

    /* DNI */
    .dni-row { display: flex; gap: 0.6rem; }
    .input-field { flex: 1; border: 2px solid var(--verde-suave); border-radius: 10px; padding: 0.6rem 0.9rem; font-family: 'Nunito', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .input-field:focus { border-color: var(--verde); }
    .btn-verde { background: var(--verde); color: white; border: none; border-radius: 10px; padding: 0.6rem 1.2rem; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
    .btn-verde:hover { background: var(--verde-claro); color: var(--verde); }
    .cliente-info { margin-top: 0.6rem; background: var(--verde-suave); border-radius: 10px; padding: 0.5rem 0.8rem; font-size: 0.88rem; color: var(--verde); font-weight: 700; display: none; }
    .cliente-info.visible { display: block; }

    /* BUSCADOR */
    .buscador-wrap { position: relative; }
    .buscador-wrap input { width: 100%; }
    .sugerencias { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); z-index: 50; max-height: 260px; overflow-y: auto; display: none; }
    .sugerencias.open { display: block; }
    .sugerencia-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.6rem 1rem; cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
    .sugerencia-item:hover { background: var(--verde-suave); }
    .sug-emoji { font-size: 1.6rem; }
    .sug-nombre { font-weight: 700; font-size: 0.9rem; }
    .sug-precio { font-size: 0.8rem; color: var(--verde); font-weight: 600; }
    .sug-oferta { font-size: 0.75rem; color: var(--rojo); font-weight: 600; }

    /* MEDIO DE PAGO */
    .medios { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
    .medio-btn { border: 2px solid var(--verde-suave); border-radius: 10px; padding: 0.6rem; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer; background: white; color: var(--texto); transition: all 0.15s; text-align: center; }
    .medio-btn.activo { border-color: var(--verde); background: var(--verde); color: white; }
    .medio-btn:hover:not(.activo) { border-color: var(--verde-claro); background: var(--verde-suave); }

    /* VUELTO */
    .vuelto-wrap { display: none; }
    .vuelto-wrap.visible { display: block; }
    .vuelto-row { display: flex; gap: 0.6rem; margin-top: 0.5rem; }
    .vuelto-resultado { margin-top: 0.6rem; background: var(--verde-suave); border-radius: 10px; padding: 0.6rem 0.9rem; font-weight: 700; color: var(--verde); font-size: 1rem; display: none; }
    .vuelto-resultado.visible { display: block; }

    /* PANEL DERECHO - CARRITO */
    .panel-der { position: sticky; top: 1.2rem; height: fit-content; }
    .carrito-vacio { text-align: center; color: #aaa; padding: 2rem 0; font-size: 0.9rem; }
    .venta-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0; border-bottom: 1px solid #f0f0f0; }
    .vi-emoji { font-size: 1.6rem; }
    .vi-info { flex: 1; }
    .vi-nombre { font-weight: 700; font-size: 0.88rem; }
    .vi-precio { font-size: 0.8rem; color: var(--verde); font-weight: 600; }
    .vi-desc { font-size: 0.73rem; color: var(--rojo); font-weight: 600; }
    .vi-controles { display: flex; align-items: center; gap: 5px; }
    .ctrl { background: var(--verde-suave); border: none; border-radius: 7px; width: 26px; height: 26px; font-size: 1rem; cursor: pointer; color: var(--verde); font-weight: 700; }
    .ctrl:hover { background: var(--verde); color: white; }
    .vi-cant { font-weight: 700; min-width: 18px; text-align: center; font-size: 0.9rem; }

    .resumen { border-top: 2px solid var(--verde-suave); padding-top: 0.8rem; margin-top: 0.5rem; }
    .res-linea { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 0.2rem 0; color: #555; }
    .res-linea.desc { color: var(--rojo); font-weight: 600; }
    .res-linea.vip { color: var(--amarillo); font-weight: 600; }
    .res-linea.total { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--verde); font-weight: 700; border-top: 1px solid #eee; margin-top: 0.4rem; padding-top: 0.4rem; }

    .btn-confirmar { width: 100%; background: var(--verde); color: white; border: none; border-radius: 12px; padding: 0.9rem; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 1rem; transition: background 0.2s; }
    .btn-confirmar:hover { background: var(--verde-claro); color: var(--verde); }
    .btn-limpiar { width: 100%; background: #f0f0f0; color: #666; border: none; border-radius: 12px; padding: 0.6rem; font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 0.88rem; cursor: pointer; margin-top: 0.5rem; }

    /* OVERLAY CONFIRMACIÓN */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: center; justify-content: center; padding: 1rem; }
    .overlay.open { display: flex; }
    .confirm-panel { background: white; width: 100%; max-width: 420px; border-radius: 20px; padding: 1.5rem; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .confirm-panel h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--verde); margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 2px solid var(--verde-suave); }
    .confirm-item { display: flex; justify-content: space-between; padding: 0.35rem 0; font-size: 0.88rem; border-bottom: 1px solid #f5f5f5; }
    .confirm-total { display: flex; justify-content: space-between; font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--verde); font-weight: 700; margin-top: 0.8rem; padding-top: 0.8rem; border-top: 2px solid var(--verde-suave); }
    .confirm-medio { background: var(--verde-suave); border-radius: 10px; padding: 0.5rem 0.8rem; font-size: 0.88rem; color: var(--verde); font-weight: 700; margin: 0.8rem 0; text-align: center; }
    .btn-ok { width: 100%; background: var(--verde); color: white; border: none; border-radius: 12px; padding: 0.8rem; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 0.8rem; }
    .btn-cancelar { width: 100%; background: #f0f0f0; color: #666; border: none; border-radius: 12px; padding: 0.6rem; font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 0.9rem; cursor: pointer; margin-top: 0.4rem; }

    /* TOAST */
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--verde); color: white; padding: 0.8rem 1.5rem; border-radius: 25px; font-weight: 700; font-size: 0.95rem; z-index: 500; transition: transform 0.3s ease; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      .panel-der { position: static; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">&#x1F4B0; ZG Ventas</div>
  <a class="back-btn" href="index.html">&#x2190; Volver</a>
</header>

<div class="layout">
  <!-- PANEL IZQUIERDO -->
  <div class="panel-izq">

    <!-- DNI -->
    <div class="card">
      <div class="card-titulo">&#x1F464; Cliente</div>
      <div class="dni-row">
        <input class="input-field" id="dni-input" type="number" placeholder="DNI del cliente (opcional)"/>
        <button class="btn-verde" onclick="buscarCliente()">Buscar</button>
        <button class="btn-verde" style="background:#aaa" onclick="limpiarCliente()">&#x2715;</button>
      </div>
      <div class="cliente-info" id="cliente-info"></div>
    </div>

    <!-- BUSCADOR DE PRODUCTOS -->
    <div class="card">
      <div class="card-titulo">&#x1F50D; Buscar producto</div>
      <div class="buscador-wrap">
        <input class="input-field" id="buscador" type="text" placeholder="Nombre o c&#243;digo de barras..." autocomplete="off" oninput="buscarProducto()" onkeydown="buscadorKeydown(event)"/>
        <div class="sugerencias" id="sugerencias"></div>
      </div>
    </div>

    <!-- MEDIO DE PAGO -->
    <div class="card">
      <div class="card-titulo">&#x1F4B3; Medio de pago</div>
      <div class="medios">
        <button class="medio-btn activo" onclick="seleccionarMedio('Efectivo', this)">&#x1F4B5; Efectivo</button>
        <button class="medio-btn" onclick="seleccionarMedio('Transferencia / Billetera', this)">&#x1F4F2; Billetera</button>
        <button class="medio-btn" onclick="seleccionarMedio('Tarjeta débito', this)">&#x1F4B4; Débito</button>
        <button class="medio-btn" onclick="seleccionarMedio('Tarjeta crédito', this)">&#x1F4B3; Crédito</button>
      </div>

      <!-- VUELTO -->
      <div class="vuelto-wrap" id="vuelto-wrap">
        <div class="card-titulo" style="margin-top:1rem">&#x1F4B0; Vuelto</div>
        <div class="vuelto-row">
          <input class="input-field" id="pago-input" type="number" placeholder="Monto recibido" oninput="calcularVuelto()"/>
        </div>
        <div class="vuelto-resultado" id="vuelto-resultado"></div>
      </div>
    </div>

  </div>

  <!-- PANEL DERECHO - CARRITO -->
  <div class="panel-der">
    <div class="card">
      <div class="card-titulo">&#x1F6D2; Venta actual</div>
      <div id="venta-items"><div class="carrito-vacio">Agregá productos &#x1F4E6;</div></div>
      <div id="venta-resumen"></div>
      <button class="btn-confirmar" onclick="abrirConfirm()">&#x2713; Confirmar venta</button>
      <button class="btn-limpiar" onclick="limpiarVenta()">&#x1F5D1; Limpiar</button>
    </div>
  </div>
</div>

<!-- OVERLAY CONFIRMACIÓN -->
<div class="overlay" id="overlay-confirm">
  <div class="confirm-panel">
    <h3>&#x1F9FE; Confirm&#225; la venta</h3>
    <div id="confirm-detalle"></div>
    <button class="btn-ok" onclick="confirmarVenta()">&#x2713; Registrar venta</button>
    <button class="btn-cancelar" onclick="cerrarConfirm()">&#x2190; Volver</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtYDn1Va-kGq7XIN_q2fQZNZ5vpamTQ_YTeZQZ4A_kI73NQf1gwGDhYi75AYLEcn99/exec";
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSv3S0-9lg6rTpkSbV5bdO-5jFbnC5agixFaFAG0pzR6cmruw8neU6tc7Vf-1Uufqj9JfDngA5YIusK/pub?gid=0&single=true&output=csv";

  const DESC_VOLUMEN_3 = 2;
  const DESC_VOLUMEN_6 = 4;
  const DESC_FIEL = 5;

  let productos = [];
  let carrito = {};
  let clienteActual = null;
  let medioPago = 'Efectivo';
  let ventaEnviando = false;

  // ===== CARGAR PRODUCTOS =====
  async function cargarProductos() {
    try {
      const res = await fetch(SHEET_URL);
      const text = await res.text();
      const lineas = text.trim().split('\n').slice(1);
      productos = lineas.filter(l => l.trim()).map(linea => {
        const p = parsearCSV(linea);
        return {
          id: parseInt(p[0]),
          nombre: (p[1] || '').trim(),
          emoji: (p[2] || '').trim(),
          precio: parseInt(p[3]) || 0,
          cat: (p[4] || '').trim(),
          desc: (p[5] || '').trim(),
          oferta: parseInt(p[6]) || 0,
          barcode: (p[8] || '').trim()
        };
      });
    } catch(e) {
      mostrarToast('Error al cargar productos');
    }
  }

  function parsearCSV(linea) {
    const r = []; let a = ''; let q = false;
    for (let c of linea) {
      if (c === '"') q = !q;
      else if (c === ',' && !q) { r.push(a); a = ''; }
      else a += c;
    }
    r.push(a); return r;
  }

  // ===== CLIENTE =====
  async function buscarCliente() {
    const dni = document.getElementById('dni-input').value.trim();
    if (!dni || dni.length < 7) { mostrarToast('DNI inválido'); return; }
    mostrarToast('Buscando...');
    try {
      const res = await fetch(SCRIPT_URL + '?accion=cliente&dni=' + encodeURIComponent(dni));
      const text = await res.text();
      const data = JSON.parse(text);
      const info = document.getElementById('cliente-info');
      if (data.encontrado) {
        clienteActual = {
          dni: data.dni.toString(),
          nombre: data.nombre,
          clienteFiel: data.clienteFiel === true || data.clienteFiel === 'true'
        };
        info.innerHTML = (clienteActual.clienteFiel ? '⭐ ' : '👤 ') + clienteActual.nombre + (clienteActual.clienteFiel ? ' — Cliente VIP' : '');
        info.classList.add('visible');
        mostrarToast(clienteActual.clienteFiel ? '⭐ Cliente VIP encontrado' : 'Cliente encontrado');
      } else {
        clienteActual = { dni, nombre: 'Sin nombre', clienteFiel: false };
        info.innerHTML = '👤 DNI ' + dni + ' (no registrado)';
        info.classList.add('visible');
        mostrarToast('DNI no registrado');
      }
    } catch(e) {
      mostrarToast('Error al buscar cliente');
      clienteActual = { dni, nombre: 'Sin nombre', clienteFiel: false };
    }
    renderCarrito();
  }

  function limpiarCliente() {
    clienteActual = null;
    document.getElementById('dni-input').value = '';
    const info = document.getElementById('cliente-info');
    info.classList.remove('visible');
    renderCarrito();
  }

  // ===== BUSCADOR =====
  function buscarProducto() {
    const q = document.getElementById('buscador').value.trim().toLowerCase();
    const sug = document.getElementById('sugerencias');
    if (!q) { sug.classList.remove('open'); return; }

    const resultados = productos.filter(p =>
      p.nombre.toLowerCase().includes(q) ||
      (p.barcode && p.barcode.includes(q))
    ).slice(0, 8);

    if (resultados.length === 0) { sug.classList.remove('open'); return; }

    sug.innerHTML = resultados.map(p => `
      <div class="sugerencia-item" onclick="agregarProducto(${p.id})">
        <span class="sug-emoji">${p.emoji}</span>
        <div>
          <div class="sug-nombre">${p.nombre}</div>
          <div class="sug-precio">$${p.precio.toLocaleString('es-AR')}</div>
          ${p.oferta > 0 ? `<div class="sug-oferta">🔥 ${p.oferta}% OFF</div>` : ''}
        </div>
      </div>
    `).join('');
    sug.classList.add('open');
  }

  function buscadorKeydown(e) {
    if (e.key === 'Enter') {
      const items = document.querySelectorAll('.sugerencia-item');
      if (items.length === 1) items[0].click();
    }
    if (e.key === 'Escape') document.getElementById('sugerencias').classList.remove('open');
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.buscador-wrap')) {
      document.getElementById('sugerencias').classList.remove('open');
    }
  });

  function agregarProducto(id) {
    carrito[id] = (carrito[id] || 0) + 1;
    document.getElementById('buscador').value = '';
    document.getElementById('sugerencias').classList.remove('open');
    renderCarrito();
    mostrarToast('Producto agregado ✓');
  }

  // ===== MEDIO DE PAGO =====
  function seleccionarMedio(medio, btn) {
    medioPago = medio;
    document.querySelectorAll('.medio-btn').forEach(b => b.classList.remove('activo'));
    btn.classList.add('activo');
    const vueltoWrap = document.getElementById('vuelto-wrap');
    if (medio === 'Efectivo') {
      vueltoWrap.classList.add('visible');
    } else {
      vueltoWrap.classList.remove('visible');
      document.getElementById('vuelto-resultado').classList.remove('visible');
    }
  }

  function calcularVuelto() {
    const total = calcularTotales().total;
    const pago = parseInt(document.getElementById('pago-input').value) || 0;
    const res = document.getElementById('vuelto-resultado');
    if (pago > 0) {
      const vuelto = pago - total;
      res.textContent = vuelto >= 0
        ? '💵 Vuelto: $' + vuelto.toLocaleString('es-AR')
        : '⚠️ Falta: $' + Math.abs(vuelto).toLocaleString('es-AR');
      res.classList.add('visible');
    } else {
      res.classList.remove('visible');
    }
  }

  // ===== CARRITO =====
  function cambiarCant(id, delta) {
    carrito[id] = (carrito[id] || 0) + delta;
    if (carrito[id] <= 0) delete carrito[id];
    renderCarrito();
    calcularVuelto();
  }

  function calcularTotales() {
    const ids = Object.keys(carrito).filter(id => carrito[id] > 0);
    const esFiel = clienteActual && clienteActual.clienteFiel;
    let subtotal = 0, descOferta = 0, descVolumen = 0;

    ids.forEach(id => {
      const p = productos.find(x => x.id == id);
      const cant = carrito[id];
      const precioBase = p.precio * cant;
      subtotal += precioBase;
      if (p.oferta > 0) descOferta += Math.round(precioBase * p.oferta / 100);
      if (!esFiel) {
        let pct = cant >= 6 ? DESC_VOLUMEN_6 : cant >= 3 ? DESC_VOLUMEN_3 : 0;
        if (pct > 0) {
          const postOferta = precioBase - (p.oferta > 0 ? Math.round(precioBase * p.oferta / 100) : 0);
          descVolumen += Math.round(postOferta * pct / 100);
        }
      }
    });

    let descFiel = 0;
    if (esFiel) {
      descFiel = Math.round((subtotal - descOferta) * DESC_FIEL / 100);
    }
    const total = subtotal - descOferta - descVolumen - descFiel;
    return { subtotal, descOferta, descVolumen, descFiel, total };
  }

  function renderCarrito() {
    const ids = Object.keys(carrito).filter(id => carrito[id] > 0);
    const itemsEl = document.getElementById('venta-items');
    const resumenEl = document.getElementById('venta-resumen');

    if (ids.length === 0) {
      itemsEl.innerHTML = '<div class="carrito-vacio">Agregá productos 📦</div>';
      resumenEl.innerHTML = '';
      return;
    }

    const esFiel = clienteActual && clienteActual.clienteFiel;

    itemsEl.innerHTML = ids.map(id => {
      const p = productos.find(x => x.id == id);
      const cant = carrito[id];
      let descInfo = '';
      if (p.oferta > 0) descInfo += `<div class="vi-desc">🔥 ${p.oferta}% OFF</div>`;
      if (!esFiel) {
        const pct = cant >= 6 ? DESC_VOLUMEN_6 : cant >= 3 ? DESC_VOLUMEN_3 : 0;
        if (pct > 0) descInfo += `<div class="vi-desc">↓ ${pct}% volumen</div>`;
      }
      return `<div class="venta-item">
        <span class="vi-emoji">${p.emoji}</span>
        <div class="vi-info">
          <div class="vi-nombre">${p.nombre}</div>
          <div class="vi-precio">$${p.precio.toLocaleString('es-AR')} x${cant}</div>
          ${descInfo}
        </div>
        <div class="vi-controles">
          <button class="ctrl" onclick="cambiarCant(${id}, -1)">−</button>
          <span class="vi-cant">${cant}</span>
          <button class="ctrl" onclick="cambiarCant(${id}, 1)">+</button>
        </div>
      </div>`;
    }).join('');

    const t = calcularTotales();
    resumenEl.innerHTML = `
      <div class="resumen">
        <div class="res-linea"><span>Subtotal</span><span>$${t.subtotal.toLocaleString('es-AR')}</span></div>
        ${t.descOferta > 0 ? `<div class="res-linea desc"><span>🔥 Ofertas</span><span>-$${t.descOferta.toLocaleString('es-AR')}</span></div>` : ''}
        ${t.descVolumen > 0 ? `<div class="res-linea desc"><span>↓ Volumen</span><span>-$${t.descVolumen.toLocaleString('es-AR')}</span></div>` : ''}
        ${t.descFiel > 0 ? `<div class="res-linea vip"><span>⭐ VIP (5%)</span><span>-$${t.descFiel.toLocaleString('es-AR')}</span></div>` : ''}
        <div class="res-linea total"><span>Total</span><span>$${t.total.toLocaleString('es-AR')}</span></div>
      </div>`;
  }

  function limpiarVenta() {
    if (Object.keys(carrito).length === 0) return;
    if (!confirm('¿Limpiar la venta actual?')) return;
    carrito = {};
    limpiarCliente();
    document.getElementById('pago-input') && (document.getElementById('pago-input').value = '');
    document.getElementById('vuelto-resultado').classList.remove('visible');
    renderCarrito();
  }

  // ===== CONFIRMACIÓN =====
  function abrirConfirm() {
    const ids = Object.keys(carrito).filter(id => carrito[id] > 0);
    if (ids.length === 0) { mostrarToast('El carrito está vacío'); return; }
    const t = calcularTotales();

    let html = '';
    if (clienteActual) {
      html += `<div style="background:var(--verde-suave);border-radius:10px;padding:0.5rem 0.8rem;margin-bottom:0.8rem;font-weight:700;color:var(--verde);font-size:0.9rem;">
        ${clienteActual.clienteFiel ? '⭐' : '👤'} ${clienteActual.nombre}
      </div>`;
    }

    ids.forEach(id => {
      const p = productos.find(x => x.id == id);
      html += `<div class="confirm-item">
        <span>${p.emoji} ${p.nombre} x${carrito[id]}</span>
        <span>$${(p.precio * carrito[id]).toLocaleString('es-AR')}</span>
      </div>`;
    });

    if (t.descOferta > 0) html += `<div class="confirm-item" style="color:var(--rojo)"><span>🔥 Ofertas</span><span>-$${t.descOferta.toLocaleString('es-AR')}</span></div>`;
    if (t.descVolumen > 0) html += `<div class="confirm-item" style="color:var(--rojo)"><span>↓ Volumen</span><span>-$${t.descVolumen.toLocaleString('es-AR')}</span></div>`;
    if (t.descFiel > 0) html += `<div class="confirm-item" style="color:var(--amarillo)"><span>⭐ VIP</span><span>-$${t.descFiel.toLocaleString('es-AR')}</span></div>`;

    html += `<div class="confirm-total"><span>Total</span><span>$${t.total.toLocaleString('es-AR')}</span></div>`;
    html += `<div class="confirm-medio">💳 ${medioPago}</div>`;

    document.getElementById('confirm-detalle').innerHTML = html;
    document.getElementById('overlay-confirm').classList.add('open');
  }

  function cerrarConfirm() {
    document.getElementById('overlay-confirm').classList.remove('open');
  }

  async function confirmarVenta() {
    if (ventaEnviando) return;
    ventaEnviando = true;
    const btnOk = document.querySelector('.btn-ok');
    btnOk.textContent = 'Guardando...';
    btnOk.style.opacity = '0.6';

    const ids = Object.keys(carrito).filter(id => carrito[id] > 0);
    const t = calcularTotales();
    const productosTexto = ids.map(id => {
      const p = productos.find(x => x.id == id);
      return `${p.nombre} x${carrito[id]}`;
    }).join(', ');

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          tipo: 'venta',
          dni: clienteActual ? clienteActual.dni : '12345678',
          nombre: clienteActual ? clienteActual.nombre : 'Sin nombre',
          productos: productosTexto,
          subtotal: t.subtotal,
          descOferta: t.descOferta,
          descVolumen: t.descVolumen,
          descFiel: t.descFiel,
          total: t.total,
          medioPago
        })
      });
    } catch(e) {
      console.warn('Error al guardar:', e);
    }

    cerrarConfirm();
    carrito = {};
    limpiarCliente();
    document.getElementById('pago-input') && (document.getElementById('pago-input').value = '');
    document.getElementById('vuelto-resultado').classList.remove('visible');
    renderCarrito();
    mostrarToast('✅ Venta registrada');
    ventaEnviando = false;
    btnOk.textContent = '✓ Registrar venta';
    btnOk.style.opacity = '1';
  }

  // ===== TOAST =====
  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ===== INIT =====
  document.getElementById('dni-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscarCliente();
  });

  cargarProductos();
</script>
</body>
</html>
